
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Celebration</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
perspective:1200px;
}

/* PAGE OPEN ANIMATION */

#page{
transform:rotateY(90deg) scale(0.8);
transform-origin:right;
animation:pageOpen 1.5s ease forwards;
}

@keyframes pageOpen{

0%{
transform:rotateY(90deg) scale(0.8);
opacity:0;
}

60%{
transform:rotateY(-10deg) scale(1.05);
}

100%{
transform:rotateY(0deg) scale(1);
opacity:1;
}

}

/* TEXT */

h1{
font-size:50px;
text-shadow:0 0 25px pink;
margin-bottom:10px;
}

p{
color:#ff99cc;
margin-bottom:30px;
}

/* CAKE */

.cake{
font-size:100px;
animation:cakeBounce 2s infinite;
}

@keyframes cakeBounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

/* BUTTON */

.startBtn{
margin-top:30px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff0066,#ff66cc);
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff3399;
transition:0.3s;
}

.startBtn:hover{
transform:scale(1.1);
box-shadow:0 0 40px #ff3399;
}

/* GIFTS */

.gifts{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:space-around;
font-size:60px;
}

.gift{
cursor:pointer;
transition:0.5s;
}

.gift:hover{
transform:scale(1.3) rotate(10deg);
}

/* CANVAS */

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="song2.mp3">
</audio>

<canvas id="particles"></canvas>

<div id="page">

<h1>Happy Birthday Ritu 🎉</h1>

<p>Let's celebrate this beautiful day 💖</p>

<div class="cake">🎂</div>

<button class="startBtn" onclick="nextPage()">
Start Your Celebration 🎊
</button>

</div>

<div class="gifts">

<div class="gift">🎁</div>
<div class="gift">🎁</div>
<div class="gift">🎁</div>

</div>

<script>

function nextPage(){
window.location.href="index3.html"
}

/* PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<200;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:2+Math.random()*3,
speed:0.5+Math.random()*2,
color:`hsl(${Math.random()*360},100%,60%)`

})

}

function drawParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.fillStyle=p.color

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.y+=p.speed

if(p.y>canvas.height){
p.y=0
p.x=Math.random()*canvas.width
}

})

requestAnimationFrame(drawParticles)

}

drawParticles()

/* FIREWORKS */

setInterval(()=>{

for(let i=0;i<30;i++){

particles.push({

x:canvas.width/2,
y:canvas.height/2,
size:3,
speed:Math.random()*5,
color:`hsl(${Math.random()*360},100%,60%)`

})

}

},3000)

</script>

</body>
</html>
